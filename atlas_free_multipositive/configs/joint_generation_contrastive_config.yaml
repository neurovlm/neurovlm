train_jsonl: atlas_free_multipositive/cache/unified_jsonl/splits/train.jsonl
text_embedding_cache: atlas_free_multipositive/cache/text_embeddings/specter_text_cache.pt
autoencoder_checkpoint: atlas_free_multipositive/outputs/runs/sparse_autoencoder/checkpoints/best_generation_top5_dice.pt
text_projection_checkpoint: atlas_free_multipositive/outputs/runs/text_to_brain_random/checkpoints/best_generation_top5_dice.pt
checkpoint_dir: atlas_free_multipositive/outputs/runs/joint_generation_contrastive/checkpoints

device: auto
seed: 42
target_shape: [36, 45, 38]
batch_size: 4
num_workers: 0
epochs: 3
lr: 0.0001
weight_decay: 0.0001
positive_texts_per_map: 2
temperature: 0.07
text_projection_init: random
freeze_encoder: false
freeze_decoder: true
max_train_batches:

model:
  latent_dim: 384
  base_channels: 8
  num_blocks: 2

loss:
  lambda_contrastive: 1.0
  lambda_generation: 0.25
  lambda_latent: 0.25

