space: MNI152_2mm
target_resolution_mm: 2.0
summary_max_words: 220
include_pubmed_title: true
include_pubmed_summary: true
include_cognitive_atlas_exact_matches: false
skip_examples_with_no_positive_texts: true

nilearn_atlases:
  - yeo_2011
  - schaefer_2018
  - harvard_oxford_cortical
  - harvard_oxford_subcortical
  - juelich
  - aal
  - smith_2009

# Other supported Nilearn variants you can add after the defaults are stable:
#   - yeo_2011_7
#   - yeo_2011_17
#   - schaefer_2018_100
#   - schaefer_2018_200
#   - schaefer_2018_400
#   - juelich_probabilistic
#   - smith_2009_10
#   - smith_2009_20
#   - difumo_64
#   - difumo_128
#   - msdl
#   - basc_064
#   - basc_122
#   - craddock_spatial
#   - craddock_temporal

# Optional priority-3 atlases that are not fetched reliably through Nilearn.
# Add local volumetric NIfTI files here after downloading/curating them.
# Supported map_type values include:
#   atlas_region, anatomical_mask, probabilistic_atlas_region, network_map, ica_component
custom_nifti_atlases:
  # - name: brainnetome
  #   path: atlas_free_multipositive/external_atlases/brainnetome.nii.gz
  #   map_type: atlas_region
  #   labels: []
  # - name: glasser_hcp_mmp
  #   path: atlas_free_multipositive/external_atlases/glasser_hcp_mmp_volumetric.nii.gz
  #   map_type: atlas_region
  #   labels: []
  # - name: hcp_task_maps
  #   path: atlas_free_multipositive/external_atlases/hcp_task_maps_4d.nii.gz
  #   map_type: network_map
  #   labels: []

pubmed:
  ale_cache_mode: packed_tensor
  save_tensor_rows_from_cache: false
  normalize_volumes: none
  clamp_nonnegative: true
