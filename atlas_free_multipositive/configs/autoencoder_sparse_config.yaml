train_jsonl: atlas_free_multipositive/cache/unified_jsonl/splits/train.jsonl
val_jsonl: atlas_free_multipositive/cache/unified_jsonl/splits/val.jsonl
output_dir: atlas_free_multipositive/outputs/runs/sparse_autoencoder
checkpoint_dir: atlas_free_multipositive/outputs/runs/sparse_autoencoder/checkpoints

device: auto
seed: 42
target_shape: [36, 45, 38]
batch_size: 64
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 4
epochs: 100
lr: 0.0003
weight_decay: 0.0001
max_train_batches:
max_val_batches:
amp: true
cudnn_benchmark: true
compile_model: false
val_interval: 5
compute_train_metrics: true
train_metric_batches: 8
val_metric_batches: 16
metrics_device: cuda
include_voxel_auroc: false
prediction_activation: sigmoid

model:
  latent_dim: 384
  base_channels: 48
  num_blocks: 4

weighted_recon:
  type: mse
  alpha: 10.0
  gamma: 1.0
  normalize_target: true

loss:
  lambda_recon: 1.0
  lambda_dice: 0.5
  lambda_topk: 0.5
  lambda_corr: 0.25
