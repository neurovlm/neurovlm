train_jsonl: atlas_free_multipositive/cache/unified_jsonl/splits/train.jsonl
val_jsonl: atlas_free_multipositive/cache/unified_jsonl/splits/val.jsonl
text_embedding_cache: atlas_free_multipositive/cache/text_embeddings/specter_text_cache.pt
autoencoder_checkpoint: atlas_free_multipositive/outputs/runs/sparse_autoencoder/checkpoints/best_generation_top5_dice.pt
output_dir: atlas_free_multipositive/outputs/runs/text_to_brain_pretrained_infonce
checkpoint_dir: atlas_free_multipositive/outputs/runs/text_to_brain_pretrained_infonce/checkpoints

device: auto
seed: 42
target_shape: [36, 45, 38]
batch_size: 256
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 4
epochs: 100
lr: 0.0001
weight_decay: 0.0001
positive_texts_per_map: 1
text_projection_init: pretrained_text_infonce  # random | pretrained_text_infonce
prediction_activation: sigmoid
max_train_batches:
max_val_batches:
amp: true
cudnn_benchmark: true
val_interval: 5
compute_train_metrics: true
train_metric_batches: 8
val_metric_batches: 16
metrics_device: cuda
include_voxel_auroc: false

freeze:
  specter: true
  cnn_encoder: true
  cnn_decoder: true
  text_projection: false

model:
  latent_dim: 384
  base_channels: 48
  num_blocks: 4
  encoder_arch: resnet
  blocks_per_stage: 2
  use_dilation: false
  multi_scale: true
  global_context: attention

weighted_recon:
  type: mse
  alpha: 10.0
  gamma: 1.0
  normalize_target: true

latent_alignment:
  enabled: true
  type: cosine
  weight: 1.0
  detach_brain_z: true

loss:
  lambda_recon: 1.0
  lambda_latent: 1.0
  lambda_dice: 0.5
  lambda_topk: 0.5
  lambda_corr: 0.25
