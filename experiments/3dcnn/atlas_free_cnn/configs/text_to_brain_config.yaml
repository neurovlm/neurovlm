train_jsonl: experiments/3dcnn/atlas_free_cnn/cache/unified_jsonl/splits/train.jsonl
val_jsonl: experiments/3dcnn/atlas_free_cnn/cache/unified_jsonl/splits/val.jsonl
test_jsonl: experiments/3dcnn/atlas_free_cnn/cache/unified_jsonl/splits/test.jsonl
eval_jsonls:
  networks_test: experiments/3dcnn/atlas_free_cnn/cache/network_eval/network_test.jsonl
text_embedding_cache: experiments/3dcnn/atlas_free_cnn/cache/text_embeddings/specter_text_cache.pt
autoencoder_checkpoint: experiments/3dcnn/atlas_free_cnn/outputs/runs/autoencoder_stable_mixed_base/checkpoints/best_cnn_autoencoder.pt
output_dir: experiments/3dcnn/atlas_free_cnn/outputs/runs/text_to_brain_pretrained_infonce
checkpoint_dir: experiments/3dcnn/atlas_free_cnn/outputs/runs/text_to_brain_pretrained_infonce/checkpoints

device: auto
seed: 42
target_shape: [36, 45, 38]
batch_size: 256
preflight_batch_size: true
batch_candidates: [4096, 3072, 2048, 1536, 1024, 768, 512]
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 4
epochs: 300
early_stopping: true
early_stopping_metric: val_loss
early_stopping_patience: 25
early_stopping_min_delta: 0.0
lr: 0.0001
weight_decay: 0.0001
positive_texts_per_map: 1
text_projection_init: pretrained_text_infonce  # random | pretrained_text_infonce
prediction_activation: none
max_train_batches:
max_val_batches:
amp: true
cudnn_benchmark: true
val_interval: 5
compute_train_metrics: true
train_metric_batches: 8
val_metric_batches: 16
metrics_device: cuda
include_voxel_auroc: false
test_metric_batches:
max_test_batches:
eval_batch_size:
eval_num_workers: 0

freeze:
  specter: true
  cnn_encoder: true
  cnn_decoder: true
  text_projection: false

model:
  latent_dim: 384
  base_channels: 48
  num_blocks: 4
  encoder_arch: plain
  dropout: 0.1
  norm: group
  pooling: max
  blocks_per_stage: 2
  use_dilation: false
  multi_scale: false
  global_context: none

text_to_brain_projection:
  hidden_dim: 512   # ablate 512, 1024, 2048
  depth: 2
  dropout: 0.1

weighted_recon:
  type: mse
  alpha: 0.0
  gamma: 1.0
  normalize_target: true

latent_alignment:
  enabled: true
  type: cosine
  weight: 1.0
  detach_brain_z: true

loss:
  lambda_recon: 1.0
  lambda_latent: 1.0
  lambda_dice: 0.0
  lambda_topk: 0.0
  lambda_corr: 0.0
